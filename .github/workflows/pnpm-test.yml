name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      matrix:
        job: [quality, build, unit-tests, coverage]

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality checks
        if: matrix.job == 'quality'
        run: pnpm quality

      - name: Build
        if: matrix.job == 'build'
        run: pnpm build

      - name: Unit tests
        if: matrix.job == 'unit-tests'
        run: pnpm test
        timeout-minutes: 10

      - name: Coverage tests
        if: matrix.job == 'coverage'
        run: pnpm test:coverage
        timeout-minutes: 15

      - name: Upload Coverage to Codecov
        if: matrix.job == 'coverage'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Security scanning job with appropriate permissions
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency security audit
        run: |
          echo "Running pnpm audit..."
          pnpm audit --audit-level=high --json > audit-report.json || AUDIT_EXIT=$?
          
          # Generate human-readable report
          echo "## Dependency Security Audit Report" > audit-report.md
          echo "" >> audit-report.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> audit-report.md
          echo "" >> audit-report.md
          
          if [ -s audit-report.json ]; then
            # Parse JSON and create summary
            echo "### Summary" >> audit-report.md
            jq -r '.metadata | "- Total dependencies: \(.totalDependencies // "N/A")\n- Vulnerabilities found: \(.vulnerabilities.total // 0)\n  - Info: \(.vulnerabilities.info // 0)\n  - Low: \(.vulnerabilities.low // 0)\n  - Moderate: \(.vulnerabilities.moderate // 0)\n  - High: \(.vulnerabilities.high // 0)\n  - Critical: \(.vulnerabilities.critical // 0)"' audit-report.json >> audit-report.md || echo "Unable to parse audit summary" >> audit-report.md
            
            echo "" >> audit-report.md
            echo "### Details" >> audit-report.md
            echo "" >> audit-report.md
            echo "See audit-report.json for full details." >> audit-report.md
          else
            echo "✅ No vulnerabilities found!" >> audit-report.md
          fi
          
          # Display report
          cat audit-report.md
          
          # Fail if high or critical vulnerabilities found
          if [ ! -z "$AUDIT_EXIT" ] && [ $AUDIT_EXIT -ne 0 ]; then
            echo "❌ Security audit failed: High or critical vulnerabilities detected"
            echo "Please review audit-report.json and update vulnerable dependencies"
            exit 1
          fi
          
          echo "✅ Security audit passed: No high or critical vulnerabilities"

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-audit-report
          path: |
            audit-report.json
            audit-report.md
          retention-days: 90

      - name: Security scan (njsscan)
        id: njsscan
        uses: ajinabraham/njsscan-action@231750a435d85095d33be7d192d52ec650625146 # v9
        with:
          args: '. --sarif --output results.sarif || true'

      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          sarif_file: results.sarif

  # Playwright E2E测试 - 独立job避免版本冲突
  e2e-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [ci, security]
    if: success()

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: ./scripts/install-playwright.sh

      - name: Build application
        run: pnpm build

      - name: Start application and run tests
        run: |
          # 启动应用
          echo "Starting Next.js application..."
          pnpm start &
          APP_PID=$!

          # 等待应用就绪
          echo "Waiting for application to be ready..."
          RETRY_COUNT=0
          MAX_RETRIES=60

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "✅ Health check passed!"
              break
            fi
            
            if [ $RETRY_COUNT -eq 0 ]; then
              echo "⏳ Waiting for application startup..."
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 2
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ Application failed to start within timeout"
              echo "Checking application logs..."
              ps aux | grep node || true
              curl -v http://localhost:3000/api/health || true
              kill $APP_PID || true
              exit 1
            fi
          done

          # 验证应用响应和主页
          echo "🔍 Verifying application response..."
          curl -f http://localhost:3000/api/health

          # Additional wait for homepage to be fully ready
          echo "🔍 Verifying homepage accessibility..."
          RETRY_COUNT=0
          MAX_RETRIES=30

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s http://localhost:3000/ >/dev/null 2>&1; then
              echo "✅ Homepage is accessible!"
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 1
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "⚠️ Homepage check failed, but continuing with tests..."
              break
            fi
          done

          # Give the app a bit more time to fully initialize
          echo "⏳ Final initialization wait..."
          sleep 5

          # 运行E2E测试
          # 将 grid-size-switching 单独执行，避免其重试/串行特性影响整包稳定性与诊断信息。
          echo "🧪 Running E2E tests (phased)..."

          # Set environment variables for more resilient testing
          export CI=true
          export BASE_URL=http://localhost:3000

          # Let Playwright handle per-test retries. Avoid rerunning the whole suite in shell,
          # which can hide the original failure and introduce extra flakiness.
          pnpm exec playwright test --grep-invert "Grid Size Switching Tests"
          NON_GRID_EXIT=$?

          if [ $NON_GRID_EXIT -eq 0 ]; then
            pnpm exec playwright test e2e/grid-size-switching.spec.ts --project=chromium
            GRID_EXIT=$?
          else
            GRID_EXIT=0
          fi

          if [ $NON_GRID_EXIT -ne 0 ]; then
            TEST_EXIT=$NON_GRID_EXIT
          else
            TEST_EXIT=$GRID_EXIT
          fi

          # 清理
          echo "🧹 Cleaning up..."
          kill $APP_PID || true
          exit $TEST_EXIT
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
